<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Adoção de Cães (ONG)</title>
</head>
<body>

    <header class="cabeçalho">
        <h1> Formulário de Adoção de Cães (ONG) </h1>
    </header>
    <br>

    <form id="formularioadocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite o seu nome completo">

        <br>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite o seu email">

        <br>
        <br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" placeholder="Digite o seu número de telefone">

        <br>
        <br>

        <label for="CPF">CPF:</label>
        <input type="text" id="CPF" placeholder="Digite o seu CPF">

        <br>
        <br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Digite a sua idade">

        <br>
        <br>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite a sua cidade">

        <br>
        <br>

        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>

        <br>
        <br>

        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não 

        <br>
        <br>

        <label for="pet">Já teve pet antes?</label>
        <input type="radio" name="pet" value="sim">Sim
        <input type="radio" name="pet" value="nao">Não 

        <br>
        <br>

        <label for="horasSozinho">Quantas horas o animal ficará sozinho por dia?</label>
        <input type="number" id="horasSozinho" placeholder="Informe a quantidade de horas">

        <br>
        <br>

        <label for="motivo">Porque você deseja adotar um pet?</label>
        <input type="textarea" id="motivo" placeholder="informe o motivo da adoção">

        <br>
        <br>

        <label for="responsabilidade">Você aceita os termos de responsabilidade?</label>
        <input type="checkbox" id="responsabilidade">


        <br><br>
        <button type="submit">Enviar</button>

    </form>

    <div id="resultado"></div>

    <script src="script.js"></script>
    

</body>
</html>
